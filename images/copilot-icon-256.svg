<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Copilot-style icon (no grid)">
  <defs>
    <linearGradient id="helmetGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#9b5cf6"/>
      <stop offset="55%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#2b6cff"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1536"/>
      <stop offset="100%" stop-color="#122a7a"/>
    </linearGradient>
    <linearGradient id="gogglesGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#28fff0" stop-opacity="1"/>
      <stop offset="60%" stop-color="#00c2ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00c2ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Transparent background is implicit -->

  <!-- Outer helmet shape -->
  <g filter="url(#softShadow)">
    <path d="M36 108 C36 60 220 60 220 108 L220 144 C220 196 36 196 36 144 Z"
          fill="url(#helmetGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  </g>

  <!-- Headset earpieces -->
  <g>
    <ellipse cx="36" cy="140" rx="18" ry="26" fill="#3b82f6"/>
    <ellipse cx="220" cy="140" rx="18" ry="26" fill="#3b82f6"/>
    <ellipse cx="36" cy="140" rx="10" ry="16" fill="#10254f"/>
    <ellipse cx="220" cy="140" rx="10" ry="16" fill="#10254f"/>
  </g>

  <!-- Face window -->
  <rect x="64" y="92" rx="18" ry="18" width="128" height="92"
        fill="url(#faceGrad)" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>

  <!-- Chin rim -->
  <path d="M64 176 C96 208 160 208 192 176" fill="none" stroke="rgba(0,0,0,0.22)" stroke-width="8" stroke-linecap="round"/>

  <!-- Goggles -->
  <g>
    <rect x="70" y="46" width="52" height="36" rx="14" fill="url(#gogglesGrad)" stroke="rgba(0,0,0,0.12)" stroke-width="3"/>
    <rect x="134" y="46" width="52" height="36" rx="14" fill="url(#gogglesGrad)" stroke="rgba(0,0,0,0.12)" stroke-width="3"/>
    <rect x="86" y="62" width="84" height="12" rx="6" fill="rgba(255,255,255,0.05)"/>
  </g>

  <!-- Eyes -->
  <g>
    <rect x="110" y="118" width="14" height="30" rx="7" fill="#00ffe8"/>
    <rect x="132" y="118" width="14" height="30" rx="7" fill="#00ffe8"/>
    <ellipse cx="117" cy="134" rx="18" ry="12" fill="url(#eyeGlow)" opacity="0.95"/>
    <ellipse cx="139" cy="134" rx="18" ry="12" fill="url(#eyeGlow)" opacity="0.95"/>
  </g>

  <!-- subtle top highlight -->
  <path d="M58 88 C92 68 164 68 198 88" stroke="#ffffff" stroke-width="6" fill="none" opacity="0.12" stroke-linecap="round"/>

</svg>
